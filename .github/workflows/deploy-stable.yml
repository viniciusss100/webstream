name: Deploy to Stable
on:
  push:
    tags:
      - 'v*'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install and build
        run: |
          npm install
          npm run build
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEAMUP_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan a.baby-beamup.club >> ~/.ssh/known_hosts
      - name: Deploy to Stable
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git remote add beamup dokku@a.baby-beamup.club:87d6a6ef6b58/webstreamrmbg
          git add dist/ --force
          git commit -m "ci: build for stable deploy ${{ github.ref_name }}" || true
          git push beamup HEAD:main --force
      - name: Verify deployment
        run: |
          sleep 30
          curl -f http://87d6a6ef6b58-webstreamrmbg.baby-beamup.club/manifest.json \
            || echo "Warning: may still be starting up"
          echo "Deployed ${{ github.ref_name }} to stable"
